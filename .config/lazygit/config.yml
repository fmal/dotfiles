gui:
  nerdFontsVersion: "3"
  showBottomLine: false
  # fuzzy matching when filtering with /
  filterMode: fuzzy
  # show ahead/behind counts vs master/main in the branches panel
  showDivergenceFromBaseBranch: arrowAndNumber
  # colors follow the terminal (ghostty poimandres storm) via ANSI defaults;
  # only the muted grays aren't in the 16-color palette
  theme:
    activeBorderColor:
      - blue
      - bold
    # default cyan is the same hex as blue in poimandres; keep search distinct
    searchingActiveBorderColor:
      - yellow
      - bold
    inactiveBorderColor:
      - "#506477"
    selectedLineBgColor:
      - "#303340"
git:
  # first entry is the default; cycle with | and \
  pagers:
    - # semantic diff by default; inline fits the narrow pane better than side-by-side
      externalDiffCommand: difft --color=always --display=inline
    - # git's line diff prettified, same as the pager in gitconfig
      pager: diff-so-fancy

# os.editPreset not needed: lazygit derives the vscode preset from
# gitconfig's core.editor (code -w)

disableStartupPopups: true
# return from subprocesses (like `e`) without a "press enter" prompt
promptToReturnFromSubprocess: false

customCommands:
  # delete local branches whose upstream is gone (open PR in browser is built in: G)
  - key: <c-g>
    context: localBranches
    description: Prune local branches no longer on the remote
    command: |
      git fetch -p && for branch in $(git for-each-ref --format '%(refname) %(upstream:track)' refs/heads | awk '$2 == "[gone]" {sub("refs/heads/", "", $1); print $1}'); do git branch -D $branch; done
    loadingText: Pruning gone branches...
    output: log
  # conventional commit menu, for repos that enforce the format
  - key: <c-v>
    context: files
    description: Create conventional commit
    prompts:
      - type: menu
        key: Type
        title: Type of change
        options:
          - name: feat
            description: A new feature
            value: feat
          - name: fix
            description: A bug fix
            value: fix
          - name: chore
            description: Changes that don't modify src or test files
            value: chore
          - name: refactor
            description: Neither fixes a bug nor adds a feature
            value: refactor
          - name: docs
            description: Documentation only changes
            value: docs
          - name: test
            description: Adding or correcting tests
            value: test
          - name: build
            description: Build system or external dependencies
            value: build
          - name: ci
            description: CI configuration files and scripts
            value: ci
          - name: perf
            description: A code change that improves performance
            value: perf
          - name: style
            description: Formatting; no change to code meaning
            value: style
          - name: revert
            description: Reverts a previous commit
            value: revert
      - type: input
        key: Scope
        title: Scope (optional)
        initialValue: ""
      - type: menu
        key: Breaking
        title: Breaking change
        options:
          - name: "no"
            value: ""
          - name: "yes"
            value: "!"
      - type: input
        key: Message
        title: Message
        initialValue: ""
    command: "git commit --message '{{.Form.Type}}{{ if .Form.Scope }}({{ .Form.Scope }}){{ end }}{{.Form.Breaking}}: {{.Form.Message}}'"
    loadingText: Committing...
